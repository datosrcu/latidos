<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Credenciales - Programa Latidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f1f5f9;
        }

        .card-container {
            width: 350px;
            height: 550px;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 6px solid #6366f1; /* Borde violeta más grueso y visible */
        }

        .card-accent {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            z-index: 0;
        }

        .logo-container {
            position: relative;
            z-index: 10;
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 4px 10px -2px rgba(99, 102, 241, 0.2);
            border: 3px solid #6366f1; /* Borde violeta para el contenedor del logo */
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 130px;
            height: 130px;
        }

        .loader-spinner {
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="flex flex-col items-center justify-start min-h-screen p-6 md:p-12">

    <header class="w-full max-w-md text-center mb-10">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Generar Credencial</h1>
        <p class="text-slate-500 mt-2">Ingresa tu DNI para obtener tu credencial digital</p>
        <p id="dniError" class="text-rose-500 text-xs font-bold mt-2 hidden animate-bounce">¡Sin puntos ni espacios!</p>
    </header>

    <main class="w-full max-w-md space-y-8">
        <!-- Formulario de Búsqueda -->
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <div class="space-y-6">
                <input type="tel" id="dniInput" placeholder="Tu DNI aquí"
                    class="w-full text-center text-3xl font-bold py-5 px-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500 text-slate-700 bg-slate-50 focus:bg-white transition-all"
                    inputmode="numeric">
                <button id="btnGenerate" onclick="fetchAndGenerate()"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl text-xl font-bold transition-all active:scale-95 flex items-center justify-center gap-3">
                    <span id="btnText">Generar Credencial</span>
                    <div id="btnLoader"
                        class="hidden w-6 h-6 border-3 border-white border-t-transparent rounded-full loader-spinner">
                    </div>
                </button>
            </div>
        </div>

        <!-- Previsualización de la Credencial -->
        <div id="previewContainer"
            class="hidden flex flex-col items-center space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div id="idCard" class="card-container flex flex-col items-center">
                <div class="card-accent"></div>

                <div class="logo-container">
                    <img id="cardLogo" src="credencial.png" alt="Logo" class="h-20 w-auto object-contain">
                </div>

                <div class="mt-8 text-center px-8 w-full flex-grow flex flex-col justify-center">
                    <p class="text-xs uppercase tracking-[0.2em] font-bold text-slate-400 mb-2">Beneficiaria</p>
                    <h2 id="cardName" class="text-2xl font-black text-slate-800 leading-tight mb-4">NOMBRE APELLIDO</h2>

                    <div class="space-y-4">
                        <div class="flex flex-col items-center">
                            <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">DNI</p>
                            <p id="cardDni" class="text-xl font-bold text-slate-700">00.000.000</p>
                        </div>

                        <div class="py-4 border-t border-slate-100 mt-6">
                            <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">
                                Participante Activa <span id="cardVencimiento" class="text-slate-500 font-normal normal-case ml-1"></span>
                            </p>
                            <p class="text-[10px] text-slate-400 mt-1 uppercase">Programa Latidos</p>
                        </div>
                    </div>
                </div>

                <!-- Logo Municipio al Pie de la Credencial -->
                <div class="pb-6">
                    <img id="muniLogo" src="logo-solo.jpg" alt="Logo Municipio" class="h-10 w-auto opacity-70">
                </div>

            </div>
        </div>

        <button onclick="downloadPDF()"
            class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-5 rounded-2xl text-xl font-bold transition-all shadow-lg active:scale-95 flex items-center justify-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Descargar Credencial (PDF)
        </button>
        </div>
    </main>

    <footer class="mt-12 text-slate-400 text-sm flex flex-col items-center gap-2">
        <p>&copy; 2026 Programa Latidos</p>
        <p class="font-semibold text-slate-500">Producto desarrollado por la Subsecretaría de Estadistica</p>
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyo5DjG58q5tRDL-A2dQDyIiOHE1h5l9HM9IGmtjA-K-guUSDrVJfU6E8IrLJB1j6OXGw/exec';

        // Función para convertir imagen a Base64 y evitar que desaparezca en el PDF
        function preloadLogo() {
            const logos = [
                { id: 'cardLogo', src: 'credencial.png' },
                { id: 'muniLogo', src: 'logo-solo.jpg' }
            ];

            logos.forEach(logoData => {
                const img = new Image();
                img.src = logoData.src;
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0);
                    const logoEl = document.getElementById(logoData.id);
                    if (logoEl) logoEl.src = canvas.toDataURL("image/png");
                };
            });
        }
        window.addEventListener('load', preloadLogo);

        const dniInput = document.getElementById('dniInput');

        // Solo permitir números y mostrar error si hay puntos
        dniInput.addEventListener('input', (e) => {
            if (e.data === '.' || e.data === ',' || e.target.value.includes('.') || e.target.value.includes(',')) {
                const errorTip = document.getElementById('dniError');
                errorTip.classList.remove('hidden');
                setTimeout(() => { errorTip.classList.add('hidden'); }, 3000);
            }
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        async function fetchAndGenerate() {
            const dni = document.getElementById('dniInput').value;
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const previewContainer = document.getElementById('previewContainer');

            if (!dni) {
                alert('Por favor, ingresa un DNI');
                return;
            }

            // UI Loading
            btnText.textContent = 'Buscando...';
            btnLoader.classList.remove('hidden');
            previewContainer.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?dni=${dni}`);
                const data = await response.json();

                if (data.apto === true || data.apto === "true") {
                    document.getElementById('cardName').textContent = data.nombre.toUpperCase();
                    document.getElementById('cardDni').textContent = data.dni;

                    console.log("Datos recibidos de la API:", data);

                    // Buscar el valor de FPP con exactitud de nombre y limpieza
                    let rawFpp = data["Fecha probable del parto"] || data.fpp || data.FPP || null;
                    if (!rawFpp) {
                        for (const key in data) {
                            if (key.toLowerCase().includes('fecha') || key.toLowerCase().includes('parto')) {
                                rawFpp = data[key];
                                break;
                            }
                        }
                    }

                    // Calcular vencimiento si existe FPP
                    let vencimientoStr = "";
                    let vencimientoDate = null;
                    
                    if (rawFpp) {
                        let fpp;
                        // Si la fecha viene en texto crudo estilo DD/MM/YYYY de Google Sheets
                        if (typeof rawFpp === 'string' && rawFpp.includes('/')) {
                            const partes = rawFpp.split('/');
                            if (partes.length === 3 && partes[2].length === 4) {
                                // Dia, Mes-1, Año
                                fpp = new Date(partes[2], partes[1] - 1, partes[0]);
                            } else {
                                fpp = new Date(rawFpp);
                            }
                        } else {
                            fpp = new Date(rawFpp);
                        }

                        // Asegurar tratar como Date validando posibles Invalid Date
                        if (!isNaN(fpp.getTime())) {
                            vencimientoDate = new Date(fpp.getFullYear(), fpp.getMonth() + 12, fpp.getDate());
                            const day = String(vencimientoDate.getDate()).padStart(2, '0');
                            const month = String(vencimientoDate.getMonth() + 1).padStart(2, '0');
                            const year = vencimientoDate.getFullYear();
                            vencimientoStr = `${day}/${month}/${year}`;
                            
                            document.getElementById('cardVencimiento').textContent = `hasta el ${vencimientoStr}`;
                        } else {
                            document.getElementById('cardVencimiento').textContent = ``;
                            console.warn("ADVERTENCIA: La API devolvió una fecha, pero el formato es inválido.", rawFpp);
                        }
                    } else {
                        document.getElementById('cardVencimiento').textContent = ``;
                        console.warn("ADVERTENCIA: La API devolvió Apto pero el objeto JSON no contiene ninguna propiedad FPP.", data);
                    }

                    previewContainer.classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

                    // Guardar registro en Firestore (solo si no existe)
                    try {
                        if (window.db && window.doc && window.getDoc && window.setDoc) {
                            const credRef = window.doc(window.db, "credenciales", data.dni.toString());
                            const credSnap = await window.getDoc(credRef);
                            
                            if (!credSnap.exists()) {
                                await window.setDoc(credRef, {
                                    dni: data.dni,
                                    nombre: data.nombre.toUpperCase(),
                                    fpp: rawFpp || null,
                                    vencimientoAsDate: vencimientoDate ? vencimientoDate.toISOString() : null,
                                    vencimientoFormat: vencimientoStr,
                                    createdAt: new Date().toISOString()
                                });
                            }
                        }
                    } catch (dbError) {
                        console.warn("No se pudo guardar la credencial en Firestore por permisos o error de red.", dbError);
                    }

                } else {
                    alert('No se encontró una participante apta con ese DNI.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ocurrió un error al consultar la base de datos.');
            } finally {
                btnText.textContent = 'Generar Credencial';
                btnLoader.classList.add('hidden');
            }
        }

        function downloadPDF() {
            const element = document.getElementById('idCard');
            const dni = document.getElementById('cardDni').textContent;

            const opt = {
                margin: [40, 40], // Márgenes muy amplios para que la credencial quede en el centro y sea pequeña
                filename: `Credencial_Latidos_${dni}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: {
                    scale: 2,
                    useCORS: true,
                    letterRendering: true,
                    scrollY: 0
                },
                jsPDF: {
                    unit: 'mm',
                    format: 'a4',
                    orientation: 'portrait'
                }
            };

            // Ejecutar la descarga
            html2pdf().set(opt).from(element).save();
        }
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-analytics.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkGfzXSIyxDAQjDbxwhDmc0kI4TThqGx8",
            authDomain: "programa-latidos.firebaseapp.com",
            projectId: "programa-latidos",
            storageBucket: "programa-latidos.firebasestorage.app",
            messagingSenderId: "205268087010",
            appId: "1:205268087010:web:1f7bb406fbae3fb024aebb",
            measurementId: "G-RGLDFG6SS7"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        
        // Exponer Firebase localmente para fetchAndGenerate
        window.db = getFirestore(app);
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
    </script>
</body>

</html>
